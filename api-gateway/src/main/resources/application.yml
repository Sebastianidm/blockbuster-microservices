server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      default-filters:
        - TokenRelay
      routes:
        # Enrutamiento para Catálogo
        - id: catalog
          uri: lb://catalog
          predicates:
            - Path=/api/v1/movies/**, /api/v1/catalog/**

        # Enrutamiento para Usuarios
        - id: users
          uri: lb://users
          predicates:
            - Path=/api/v1/users/**, /api/v1/auth/**

        # Enrutamiento para Transacciones 
        - id: transactions
          uri: lb://transactions
          predicates:
            - Path=/api/v1/rentals/**

        # Enrutamiento para Notificaciones
        - id: notifications
          uri: lb://notifications
          predicates:
            - Path=/api/v1/notifications/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka