spring.application.name=users
spring.config.import=optional:file:.env[.properties]

server.port=8082

spring.datasource.url=jdbc:postgresql://ep-purple-field-ambv85u7-pooler.c-5.us-east-1.aws.neon.tech/users_db?sslmode=require&channelBinding=require
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.root=INFO

jwt.secret=${JWT_SECRET:Esta_es_una_clave_secreta_super_larga_y_segura_para_el_proyecto_blockbuster_2026}
jwt.expiration=${JWT_EXPIRATION:86400000}
internal.api.key=${INTERNAL_API_KEY:change-this-internal-api-key}

notifications.service.url=${NOTIFICATIONS_SERVICE_URL:http://localhost:8084}
spring.cloud.openfeign.client.config.notificationsClient.connectTimeout=5000
spring.cloud.openfeign.client.config.notificationsClient.readTimeout=5000


eureka.client.service-url.defaultZone=http://localhost:8761/eureka