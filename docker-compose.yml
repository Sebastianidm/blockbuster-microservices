# ==============================================================================
# MASTER DOCKER COMPOSE - INFRAESTRUCTURA LOCAL (Hito 1)
# ==============================================================================

version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # 1. Base de datos relacional: PostgreSQL
  # ----------------------------------------------------------------------------
  postgres-db:
    image: postgres:16-alpine
    container_name: blockbuster-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres # Base de datos por defecto (las demás se crean vía script)
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - blockbuster-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # 2. Base de datos NoSQL: MongoDB
  # ----------------------------------------------------------------------------
  mongo-db:
    image: mongo:7.0
    container_name: blockbuster-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: notifications_db # Base de datos inicial para notifications
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - blockbuster-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # 3. Servidor de Registro y Descubrimiento: Eureka Server
  # ----------------------------------------------------------------------------
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: blockbuster-eureka
    restart: always
    ports:
      - "${EUREKA_PORT}:8761"
    networks:
      - blockbuster-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # 4. Puerta de Enlace API: Spring Cloud Gateway
  # ----------------------------------------------------------------------------
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: blockbuster-gateway
    restart: always
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      # Conectividad interna con Eureka en la red de Docker
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - blockbuster-network

# ------------------------------------------------------------------------------
# REDES INTERNAS Y VOLÚMENES PERSISTENTES
# ------------------------------------------------------------------------------
networks:
  blockbuster-network:
    name: blockbuster-network
    driver: bridge

volumes:
  postgres_data:
    name: blockbuster_postgres_data
  mongo_data:
    name: blockbuster_mongo_data
