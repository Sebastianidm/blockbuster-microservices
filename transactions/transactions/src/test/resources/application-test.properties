spring.datasource.url=jdbc:h2:mem:transactionstest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/test-migration

users.service.url=http://localhost:8082
catalog.service.url=http://localhost:8081
notifications.service.url=http://localhost:8084
internal.api.key=test-internal-key
jwt.secret=test-jwt-secret-with-at-least-32-characters
jwt.expiration=86400000
